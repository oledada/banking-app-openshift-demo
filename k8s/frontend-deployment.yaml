apiVersion: apps/v1
kind: Deployment
metadata:
  name: banking-frontend
  namespace: banking-app          # ← adapte au namespace que tu utilises
  labels:
    app: banking-frontend
    tier: frontend
spec:
  replicas: 2                     # 2 pods pour commencer (HA de base)
  selector:
    matchLabels:
      app: banking-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 25%
      maxSurge: 25%
  template:
    metadata:
      labels:
        app: banking-frontend
        tier: frontend
    spec:
      containers:
      - name: frontend
        image: quay.io/ton-compte/banking-frontend:latest   # ← ton image pushée
        imagePullPolicy: IfNotPresent
        
        ports:
        - containerPort: 8080
          name: http
        
        # Variables d'environnement utiles (optionnel)
        env:
        - name: BACKEND_API_URL
          value: "http://banking-backend.banking-app.svc.cluster.local:8080"
          # ou via configmap/secret si tu veux le rendre configurable
        
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "384Mi"
        
        livenessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 15
          periodSeconds: 20
          timeoutSeconds: 3
          failureThreshold: 5
        
        readinessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 2
          successThreshold: 1
          failureThreshold: 3
        
        # Optionnel : si tu veux ajouter des headers de sécurité
        # lifecycle:
        #   postStart:
        #     exec:
        #       command: ["/bin/sh", "-c", "echo 'Sécurité activée'"]
