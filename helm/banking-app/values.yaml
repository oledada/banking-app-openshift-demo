# Default values for banking-app
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 2

image:
  repository: quay.io/ton-compte/banking-backend
  pullPolicy: IfNotPresent
  # tag: "latest"               # souvent surchargé via --set ou ArgoCD
  tag: "1.0.0"                  # version stable recommandée

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 80                      # port exposé du service
  targetPort: 8080              # port interne du conteneur Spring Boot

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: banking-backend.apps.example.com
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

resources:                      # ressources raisonnables pour un backend léger
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1536Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  # targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

# Variables d'environnement spécifiques au backend
env:
  SPRING_DATASOURCE_URL: "jdbc:postgresql://bank-postgres.banking-app.svc.cluster.local:5432/bankdb"
  SPRING_DATASOURCE_USERNAME: "bankuser"
  # SPRING_DATASOURCE_PASSWORD: ""   → à injecter via secret
  SPRING_JPA_HIBERNATE_DDL_AUTO: "update"
  SERVER_PORT: "8080"

# Secret pour les données sensibles (mot de passe DB, clés API, etc.)
existingSecret: "bank-db-credentials"
secretKeys:
  datasourcePassword: "postgres-password"   # clé dans le secret

# Activer l'auto-healing et le prune (utile avec ArgoCD)
syncPolicy:
  automated:
    prune: true
    selfHeal: true
route:
  enabled: true
  host: ""                  # vide = OpenShift génère automatiquement (recommandé)
  annotations: {}
    # haproxy.router.openshift.io/timeout: 60s   # exemple
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None    
